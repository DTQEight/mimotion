name: 触发刷步数

on:
  schedule:
    - cron: '55 17 * * *'
    - cron: '0 18 * * *'
    - cron: '5 18 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检查今天是否已成功
        id: check
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          today=$(TZ=Asia/Shanghai date '+%Y-%m-%d')
          echo "今天: $today"
          
          # 查询刷步数 workflow 最近一次运行
          latest=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/274662688/runs?per_page=1&status=completed&conclusion=success")
          
          run_date=$(echo "$latest" | python3 -c "
          import json,sys
          from datetime import datetime, timezone, timedelta
          data = json.load(sys.stdin)
          runs = data.get('workflow_runs', [])
          if runs:
              created = datetime.fromisoformat(runs[0]['created_at'].replace('Z','+00:00')).astimezone(timezone(timedelta(hours=8)))
              print(created.strftime('%Y-%m-%d'))
          else:
              print('none')
          ")
          
          echo "最近成功日期: $run_date"
          
          if [ "$run_date" = "$today" ]; then
            echo "✅ 今日已执行成功，跳过"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "⏳ 今日未执行，需要触发"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 触发刷步数
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/274662688/dispatches" \
              -d '{"ref":"master"}')
            echo "尝试 $i: HTTP $STATUS"
            if [ "$STATUS" = "204" ]; then
              echo "✅ 触发成功"
              exit 0
            fi
            sleep 10
          done
          echo "❌ 三次尝试均失败"
          exit 1
