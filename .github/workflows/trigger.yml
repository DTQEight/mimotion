name: 触发刷步数

on:
  schedule:
    - cron: '55 17 * * *'   # UTC 17:55 = 北京时间 01:55
    - cron: '0 18 * * *'    # UTC 18:00 = 北京时间 02:00
    - cron: '5 18 * * *'    # UTC 18:05 = 北京时间 02:05
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger 刷步数 via workflow_dispatch
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: token ${{ secrets.PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/274662688/dispatches" \
              -d '{"ref":"master"}')
            echo "尝试 $i: HTTP $STATUS"
            if [ "$STATUS" = "204" ]; then
              echo "✅ 触发成功"
              exit 0
            fi
            sleep 10
          done
          echo "❌ 三次尝试均失败"
          exit 1
